name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      draft:
        description: '创建为草稿发布'
        type: boolean
        default: true

env:
  CARGO_INCREMENTAL: 0
  CARGO_PROFILE_DEV_DEBUG: 0

permissions:
  contents: write

jobs:
  # ── Windows unsigned build (x86_64) ──
  build-windows:
    runs-on: windows-latest
    strategy:
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install frontend dependencies
        run: npm ci
        working-directory: insightdb_desktop

      - name: Build Tauri (Windows)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: insightdb_desktop
          tagName: ${{ github.ref_name }}
          releaseName: 'InsightDB v__VERSION__'
          releaseBody: |
            ## InsightDB v__VERSION__

            慢 SQL 诊断工作台。

            ### 下载
            - **Windows**: `.msi` 安装包 或 `.exe` 安装程序
            - **macOS**: `.dmg` 磁盘映像

            ### 功能
            - MySQL 8.0 / PostgreSQL 15+ 连接
            - SQL 执行与 EXPLAIN 计划解析
            - 6 条确定性诊断规则（全表扫描/索引缺失/filesort/临时表/NestedLoop/异常行数）
            - AI 辅助诊断解释原型（Mock 客户端，事实 vs 推断标注）
          releaseDraft: ${{ github.event.inputs.draft || true }}
          args: --target x86_64-pc-windows-msvc

  # ── macOS unsigned build (Universal: aarch64 + x86_64) ──
  build-macos:
    runs-on: macos-latest
    strategy:
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin,aarch64-apple-darwin

      - name: Install frontend dependencies
        run: npm ci
        working-directory: insightdb_desktop

      - name: Build Tauri (macOS universal)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: insightdb_desktop
          tagName: ${{ github.ref_name }}
          releaseName: 'InsightDB v__VERSION__'
          releaseDraft: ${{ github.event.inputs.draft || true }}
          args: --target universal-apple-darwin
